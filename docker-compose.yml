# docker-compose.yml
# "version" field is deprecated in Compose v2+ — removed intentionally

services:
  # ===========================================================================
  # ASR Worker Service
  # ===========================================================================
  asr-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: py-asr-worker
    restart: unless-stopped

    # Environment variables
    env_file:
      - .env

    # Volume mounts
    volumes:
      # Application code (development hot-reload — remove in production)
      - ./src:/app/src:ro
      # Logs
      - ./logs:/app/logs
      # Model cache (persist downloaded models across restarts)
      - asr-models:/app/models
      - huggingface-cache:/home/asrworker/.cache/huggingface
      # Temporary audio files (named volume — portable trên Windows Docker Desktop)
      - asr-temp:/tmp/asr-worker

    # GPU + Resource limits — using Compose v2 standard syntax
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import torch; assert torch.cuda.is_available(); import sys; sys.exit(0)"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 120s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Network
    networks:
      - asr-network

  # ===========================================================================
  # Optional: LocalStack for local development (AWS S3 + SQS mock)
  # Run with: docker compose --profile dev up
  # ===========================================================================
  localstack:
    image: localstack/localstack:latest
    container_name: localstack-asr
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - SERVICES=s3,sqs
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack-data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - asr-network
    profiles:
      - dev

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  asr-models:
    driver: local
  huggingface-cache:
    driver: local
  asr-temp:
    driver: local
  localstack-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  asr-network:
    driver: bridge
